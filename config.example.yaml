# Example configuration for the fixture-backed price drop monitor.

database:
  path: data/price-history.sqlite

priceSource:
  type: fixture-html

scheduler:
  intervalSeconds: 300
  runOnStartup: true
  maxConcurrentChecks: 2

dropDetection:
  minPercentDrop: 5
  minAbsoluteDropCents: 100

notification:
  type: console
  # Alternative zero-setup option:
  # type: file
  # filePath: data/notifications.log

server:
  port: 3000

products:
  - id: example-1
    name: Compact Mechanical Keyboard
    url: https://www.amazon.com/dp/EXAMPLE1
    fixturePath: fixtures/keyboard.html
  - id: example-2
    name: USB-C Hub
    url: https://www.amazon.com/dp/EXAMPLE2
    fixturePath: fixtures/usb-hub.html
  - id: example-3
    name: Large Desk Mat
    url: https://www.amazon.com/dp/EXAMPLE3
    fixturePath: fixtures/desk-mat.html
